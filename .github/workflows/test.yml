name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Check coverage thresholds
        run: |
          echo "Coverage thresholds enforced in vitest.config.ts"
          echo "Lines: 80%, Branches: 70%, Functions: 75%"

  playwright-components:
    name: Playwright — Component tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Only install Chromium — the component tests use the "components" project
        # which targets Desktop Chrome exclusively.
        run: npx playwright install --with-deps chromium

      - name: Build Next.js application
        # A production build is faster and more stable for CI than `npm run dev`.
        run: npm run build
        env:
          # Disable telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1
          # Ensure mock data is enabled so tests don't need a live Soroban RPC
          NEXT_PUBLIC_ENABLE_MOCK_DATA: true

      - name: Run Playwright component tests
        run: npx playwright test --project=components
        env:
          CI: true
          # Point Playwright at the production server started by webServer config
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_ENABLE_MOCK_DATA: true

      - name: Run Playwright performance baseline test
        run: npx playwright test e2e/performance.spec.ts --project=chromium
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_ENABLE_MOCK_DATA: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-component-report
          path: playwright-report/
          retention-days: 30

  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: npm run test:mutation

